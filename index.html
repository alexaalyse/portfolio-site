<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexa Mavrogianis - UX Portfolio</title>
    <meta name="description" content="UX, AI, and product strategist helping make complex systems feel intuitive and actionable">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 2rem;
            max-width: 600px;
        }
        
        .cta-button {
            display: inline-block;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .notice {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #f0f0f0;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            max-width: 300px;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .subtitle {
                font-size: 1.2rem;
            }
            
            .notice {
                position: static;
                margin-top: 2rem;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="container">
            <h1>Alexa Mavrogianis</h1>
            <p class="subtitle">
                UX, AI, and product strategist helping make complex systems feel intuitive and actionable
            </p>
            <a href="https://portfolio.alexaalyse.com" class="cta-button">
                View Full Portfolio
            </a>
        </div>
    </div>
    
    <div class="notice">
        <strong>Note:</strong> This is a static placeholder. 
        For the full interactive portfolio, please visit the live site at 
        <a href="https://portfolio.alexaalyse.com">portfolio.alexaalyse.com</a>
    </div>
</body>
</html>
